<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>무조건 포인트 적립</title>
    <style>
        /* 기본 스타일 설정 */
        :root { --primary-color: #ff4757; --bg-color: #f1f2f6; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { width: 90%; max-width: 400px; background: #fff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* 제목 영역 */
        .header { background: var(--primary-color); color: white; padding: 20px; text-align: center; font-size: 22px; font-weight: bold; }
        
        /* 광고 영역 */
        .ad-section { background: #fffbe6; padding: 30px 20px; text-align: center; border-bottom: 2px dashed #ffe58f; }
        .ad-title { color: #856404; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        .ad-content { font-size: 18px; color: #333; line-height: 1.4; }
        
        /* 입력 영역 */
        .form-section { padding: 30px 20px; text-align: center; }
        .label-text { font-size: 16px; color: #555; margin-bottom: 15px; display: block; }
        input { width: 100%; padding: 15px; font-size: 20px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; text-align: center; transition: 0.3s; }
        input:focus { border-color: var(--primary-color); }
        
        button { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 15px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); background: #e04050; }

        /* 결과 창 */
        #result { margin-top: 15px; font-weight: bold; color: #2ed573; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">무조건 포인트 적립</div>
    
    <div class="ad-section">
        <div class="ad-title">📢 이번 주 특별 광고</div>
        <div class="ad-content">지금 <strong>'대박커피'</strong> 방문 시<br>모든 음료 1,000원 할인!</div>
    </div>

    <div class="form-section">
        <label class="label-text">적립할 휴대폰 번호를 입력하세요</label>
        <input type="tel" id="phone" placeholder="010-0000-0000" maxlength="13">
        
        <button onclick="processRedeem()">100포인트 적립하기</button>
        <div id="result">✅ 성공적으로 적립되었습니다!</div>
    </div>
</div>

<script>
    const phoneInput = document.getElementById('phone');
    const resultDiv = document.getElementById('result');

    // 1. 전화번호 하이픈(-) 자동 입력 로직
    phoneInput.addEventListener('keyup', function(e) {
        let val = e.target.value.replace(/[^0-9]/g, '');
        if (val.length > 3 && val.length <= 7) {
            e.target.value = val.substring(0, 3) + '-' + val.substring(3);
        } else if (val.length > 7) {
            e.target.value = val.substring(0, 3) + '-' + val.substring(3, 7) + '-' + val.substring(7);
        }
    });

    // 2. 적립 기능 (브라우저 내부에 저장됨)
    function processRedeem() {
        const phone = phoneInput.value;

        if (phone.length < 12) {
            alert("정확한 전화번호를 입력해주세요.");
            return;
        }

        // 기존 포인트 불러오기
        let savedPoints = localStorage.getItem(phone) || 0;
        let newTotal = parseInt(savedPoints) + 100;

        // 포인트 업데이트 저장
        localStorage.setItem(phone, newTotal);

        // 결과 화면 표시
        resultDiv.style.display = "block";
        alert(`[적립 완료]\n${phone}님께 100P가 적립되었습니다.\n현재 총 포인트: ${newTotal}P`);
        
        // 입력창 초기화
        phoneInput.value = "";
        setTimeout(() => { resultDiv.style.display = "none"; }, 3000);
    }
</script>

</body>
</html>
